<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국가기술자격 통합 CBT 모의고사</title>
    <style>
        /* 테마 변수 설정 (기본: 라이트 모드) */
        :root {
            --bg-color: #f4f6f9;
            --container-bg: #fff;
            --text-color: #2c3e50;
            --muted-color: #7f8c8d;
            --border-color: #ced4da;
            --header-bg: #2c3e50;
            --header-text: #fff;
            --box-bg: #ecf0f1;
            --option-bg: #fdfdfd;
            --option-hover: #f1f3f5;
            --explain-bg: #eaf2f8;
            --btn-text: #2c3e50;
        }

        /* 다크 모드 변수 설정 */
        body.dark-mode {
            --bg-color: #121212;
            --container-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --muted-color: #aaa;
            --border-color: #333;
            --header-bg: #000000;
            --header-text: #f1c40f;
            --box-bg: #2c2c2c;
            --option-bg: #2a2a2a;
            --option-hover: #3a3a3a;
            --explain-bg: #1a252f;
            --btn-text: #e0e0e0;
        }

        body { font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; display: flex; justify-content: center; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        
        /* 🌟 인트로 영상 오버레이 스타일 */
        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        #start-intro-btn {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.5);
            transition: transform 0.2s, background-color 0.2s;
        }
        
        #start-intro-btn:hover {
            transform: scale(1.05);
            background: #2980b9;
        }

        #skip-intro-btn {
            display: none;
            position: absolute;
            bottom: 30px;
            right: 30px;
            padding: 10px 20px;
            font-size: 16px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10001;
        }
        
        #skip-intro-btn:hover { background: rgba(0,0,0,0.9); border-color: #fff; }

        /* 🌟 D-Day 계산기 위젯 스타일 */
        .d-day-widget {
            position: fixed;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 15px 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
            text-align: center;
            z-index: 9990;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, background 0.3s;
        }
        .d-day-widget:hover {
            transform: translateY(-5px);
        }
        body.dark-mode .d-day-widget {
            background: linear-gradient(135deg, #c0392b, #8e44ad);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }
        .d-day-title { font-size: 13px; font-weight: bold; opacity: 0.9; margin-bottom: 5px; }
        .d-day-value { font-size: 32px; font-weight: 900; letter-spacing: 2px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .d-day-date { font-size: 12px; opacity: 0.8; margin-top: 8px; background: rgba(0,0,0,0.2); padding: 4px 10px; border-radius: 20px; display: inline-block; font-weight: bold; }

        @media (max-width: 1200px) {
            .d-day-widget { top: 10px; left: 10px; padding: 10px 15px; }
            .d-day-value { font-size: 24px; }
        }

        .cbt-container { 
            width: 100%; max-width: 850px; background-color: var(--container-bg); border: 1px solid var(--border-color); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border-radius: 8px; overflow: hidden;
            position: relative; transition: background-color 0.3s, border-color 0.3s;
            margin-top: 20px;
        }
        
        .header { background-color: var(--header-bg); color: var(--header-text); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3498db; transition: background-color 0.3s; }
        .header-title { font-size: 19px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        
        .logo-icon { width: 24px; height: 24px; fill: #f1c40f; }

        .header-right { display: flex; align-items: center; gap: 15px; }
        .status-badge { background-color: #3498db; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; color: #fff; }
        .back-to-home-btn { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold; }
        .back-to-home-btn:hover { background-color: #c0392b; }

        .theme-btn { background: none; border: none; font-size: 22px; cursor: pointer; padding: 0; transition: transform 0.2s; outline: none; }
        .theme-btn:hover { transform: scale(1.15); }

        .content { padding: 40px 30px; min-height: 450px; }
        .screen { display: none; text-align: center; }
        .screen.active { display: block; }
        
        h2 { margin-bottom: 30px; color: var(--text-color); text-align: center; font-weight: bold; }

        .login-box { max-width: 400px; margin: 50px auto; padding: 30px; background: var(--box-bg); border-radius: 8px; border: 2px solid var(--border-color); }
        .login-input { width: 100%; padding: 12px; font-size: 16px; margin-bottom: 15px; border: 1px solid var(--border-color); border-radius: 4px; box-sizing: border-box; background-color: var(--option-bg); color: var(--text-color); }
        
        .login-btn { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; color: #fff; background-color: #3498db; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.2s; margin-bottom: 10px; }
        .login-btn:hover { background-color: #2980b9; }
        
        .guest-btn { background-color: #95a5a6; margin-bottom: 0; }
        .guest-btn:hover { background-color: #7f8c8d; }

        .btn-grid { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .exam-btn { display: block; width: 100%; max-width: 450px; padding: 20px; background-color: var(--box-bg); border: 2px solid var(--border-color); border-radius: 8px; font-size: 18px; font-weight: bold; color: var(--btn-text); cursor: pointer; transition: all 0.2s; }
        .exam-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        
        body:not(.dark-mode) .exam-btn.elec { background-color: #eaf2f8; border-color: #a9cce3; color: #154360; }
        body:not(.dark-mode) .exam-btn.electro { background-color: #e8f8f5; border-color: #a3e4d7; color: #0e6251; }
        body:not(.dark-mode) .exam-btn.elev { background-color: #fef9e7; border-color: #f9e79f; color: #7d6608; }
        
        body.dark-mode .exam-btn.elec { border-color: #3498db; color: #3498db; }
        body.dark-mode .exam-btn.electro { border-color: #1abc9c; color: #1abc9c; }
        body.dark-mode .exam-btn.elev { border-color: #f1c40f; color: #f1c40f; }

        .status-text { display: block; margin-top: 5px; font-size: 15px; font-weight: bold; color: var(--text-color); }

        .history-panel {
            position: fixed;
            top: 75px;
            right: -320px;
            width: 280px;
            background-color: var(--container-bg);
            border: 2px solid var(--border-color);
            box-shadow: -4px 0 15px rgba(0,0,0,0.3);
            border-radius: 8px 0 0 8px;
            padding: 20px;
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }
        .history-panel.open { right: 0; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 15px; }
        .history-header h3 { margin: 0; color: var(--text-color); font-size: 18px; }
        .history-close-btn { background: none; border: none; font-size: 20px; color: var(--muted-color); cursor: pointer; transition: color 0.2s; }
        .history-close-btn:hover { color: #e74c3c; }
        
        .history-item { margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px dashed var(--border-color); }
        .history-item-title { font-weight: bold; color: #3498db; margin-bottom: 8px; font-size: 15px; display: flex; align-items: center; gap: 5px; }
        .history-record { font-size: 13px; color: var(--text-color); margin-bottom: 5px; padding-left: 10px; border-left: 3px solid var(--border-color); }
        .history-record.pass { border-left-color: #2ecc71; }
        .history-record.fail { border-left-color: #e74c3c; }
        .history-record strong { font-size: 14px; }
        .pass-text { color: #2ecc71; font-weight: bold; }
        .fail-text { color: #e74c3c; font-weight: bold; }

        .history-toggle-btn {
            position: fixed;
            top: 90px;
            right: 0;
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 8px 0 0 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 999;
            box-shadow: -2px 2px 10px rgba(0,0,0,0.1);
            transition: right 0.3s;
            display: none; 
        }
        .history-toggle-btn:hover { background-color: #2980b9; }

        .timer-container { width: 100%; height: 35px; background-color: var(--box-bg); border-radius: 8px; margin-bottom: 25px; overflow: hidden; border: 2px solid var(--border-color); position: relative; display: none; }
        .timer-bar { height: 100%; width: 0%; background-color: #2ecc71; transition: width 1s linear, background-color 1s; }
        .timer-text { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; font-size: 18px; font-weight: 900; color: #2c3e50; text-shadow: 1px 1px 2px rgba(255,255,255,0.8); }

        @keyframes sirenAlert { 0% { box-shadow: inset 0 0 0px rgba(231, 76, 60, 0); background-color: var(--container-bg); } 50% { box-shadow: inset 0 0 80px rgba(231, 76, 60, 0.4); background-color: #5a1e1e; } 100% { box-shadow: inset 0 0 0px rgba(231, 76, 60, 0); background-color: var(--container-bg); } }
        .danger-mode { animation: sirenAlert 0.8s infinite; }

        @keyframes shakeScreen { 0% { transform: translate(2px, 2px) rotate(0deg); } 10% { transform: translate(-2px, -3px) rotate(-1deg); } 20% { transform: translate(-4px, 0px) rotate(1deg); } 30% { transform: translate(4px, 3px) rotate(0deg); } 40% { transform: translate(2px, -2px) rotate(1deg); } 50% { transform: translate(-2px, 3px) rotate(-1deg); } 60% { transform: translate(-4px, 2px) rotate(0deg); } 70% { transform: translate(4px, 2px) rotate(-1deg); } 80% { transform: translate(-2px, -2px) rotate(1deg); } 90% { transform: translate(2px, 3px) rotate(0deg); } 100% { transform: translate(2px, -3px) rotate(-1deg); } }
        .shake-effect { animation: shakeScreen 0.5s ease-in-out; }

        .explosion-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes boomAnim { 0% { transform: scale(0.5); opacity: 0; } 30% { transform: scale(2.5); opacity: 1; } 70% { transform: scale(2.0); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .explosion-emoji { font-size: 150px; animation: boomAnim 1.5s ease-out forwards; }
        .explosion-text { color: #e74c3c; font-size: 40px; font-weight: 900; text-shadow: 0 0 10px #000; margin-top: 20px; }

        #quiz-screen { text-align: left; }
        .difficulty-badge { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 12px; color: #fff; }
        .diff-easy { background-color: #2ecc71; }
        .diff-medium { background-color: #f39c12; }
        .diff-hard { background-color: #e74c3c; }

        .question-text { font-size: 19px; font-weight: bold; color: var(--text-color); margin-bottom: 25px; line-height: 1.5; }
        
        .svg-wrap { text-align: center; margin: 20px 0; padding: 15px; background: #fff; border: 1px solid var(--border-color); border-radius: 4px; }
        .svg-wrap svg { max-width: 320px; width: 100%; height: auto; overflow: visible; font-family: 'Malgun Gothic', '맑은 고딕', sans-serif; }

        .options-list { list-style: none; padding: 0; margin: 0; }
        .options-list li { margin-bottom: 12px; }
        .option-label { display: flex; align-items: center; padding: 15px 20px; background-color: var(--option-bg); border: 2px solid var(--border-color); border-radius: 6px; cursor: pointer; font-size: 17px; transition: background-color 0.2s; color: var(--text-color); }
        .option-label:hover:not(.disabled) { background-color: var(--option-hover); }
        .option-label.disabled { cursor: default; }
        .option-label input[type="radio"] { margin-right: 15px; transform: scale(1.3); cursor: pointer; }
        
        body:not(.dark-mode) .option-label.correct { background-color: #d4edda; border-color: #28a745; color: #155724; font-weight: bold; }
        body:not(.dark-mode) .option-label.incorrect { background-color: #f8d7da; border-color: #dc3545; color: #721c24; }
        body.dark-mode .option-label.correct { background-color: #1a4225; border-color: #2ecc71; color: #2ecc71; font-weight: bold; }
        body.dark-mode .option-label.incorrect { background-color: #4a191e; border-color: #e74c3c; color: #e74c3c; }

        .explanation-box { margin-top: 25px; padding: 20px; background-color: var(--explain-bg); border-left: 5px solid #3498db; border-radius: 4px; font-size: 16px; line-height: 1.6; color: var(--text-color); display: none; }
        .explanation-box strong { color: #3498db; font-size: 18px; display: block; margin-bottom: 10px; }

        .footer { background-color: var(--box-bg); padding: 20px 30px; display: flex; justify-content: flex-end; align-items: center; border-top: 1px solid var(--border-color); }
        .nav-btn { padding: 12px 25px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: #fff; transition: background-color 0.2s; }
        .nav-btn.next { background-color: #3498db; }
        .nav-btn.next:hover { background-color: #2980b9; }
        .nav-btn.next:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .progress-indicator { font-size: 18px; font-weight: bold; color: var(--text-color); margin-right: 20px; }

        .result-score { font-size: 60px; font-weight: 900; color: #3498db; margin: 20px 0; }
        .result-message { font-size: 22px; color: var(--text-color); margin-bottom: 30px; line-height: 1.5; }
        .retake-btn { background-color: #f39c12; color: white; border: none; padding: 12px 25px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; margin-right: 10px; }
    </style>
</head>
<body>

<div id="intro-overlay">

<script>
    // D-Day 계산 로직
    function calculateDDay() {
        const now = new Date();
        const currentYear = now.getFullYear();
        let targetDate = new Date(currentYear, 4, 9);
        
        now.setHours(0, 0, 0, 0);
        targetDate.setHours(0, 0, 0, 0);
        
        const diffTime = targetDate.getTime() - now.getTime();
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        
        const dDayValue = document.getElementById('d-day-value');
        if (diffDays > 0) {
            dDayValue.innerText = `D-${diffDays}`;
        } else if (diffDays === 0) {
            dDayValue.innerText = `D-Day!`;
        } else {
            dDayValue.innerText = `D+${Math.abs(diffDays)}`;
        }
    }
    
    calculateDDay();

    // 인트로 영상 제어 로직
    function playIntro() {
        document.getElementById('start-intro-btn').style.display = 'none';
        const vid = document.getElementById('intro-video');
        vid.style.display = 'block';
        document.getElementById('skip-intro-btn').style.display = 'block';
        
        let playPromise = vid.play();
        
        if (playPromise !== undefined) {
            playPromise.then(_ => {
            }).catch(error => {
                console.error("영상 재생 실패 원인: ", error);
                alert("영상을 불러오지 못했습니다!\n\n1. 다운로드 받은 영상 파일 이름이 '-OqDbBFcGpPM_D0sjEWW_Dropshot.mp4'가 맞는지 확인해 주세요.\n2. HTML 파일과 동영상 파일이 같은 폴더에 있어야 합니다.\n\n재생할 수 없어 바로 로그인 창으로 넘어갑니다.");
                endIntro();
            });
        }
        vid.onended = endIntro;
    }

    function endIntro() {
        const overlay = document.getElementById('intro-overlay');
        const vid = document.getElementById('intro-video');
        
        vid.pause();
        overlay.style.transition = "opacity 0.6s ease";
        overlay.style.opacity = "0";
        
        setTimeout(() => {
            overlay.style.display = "none";

    };

    function toggleHistoryPanel(action) {
        const panel = document.getElementById('history-panel');
        const btn = document.getElementById('history-toggle-btn');
        
        if (action === 'show') {
            panel.classList.add('open');
            btn.style.right = '-150px'; 
        } else if (action === 'hide') {
            panel.classList.remove('open');
            btn.style.right = '0'; 
        } else {
            if (panel.classList.contains('open')) {
                panel.classList.remove('open');
                btn.style.right = '0';
            } else {
                panel.classList.add('open');
                btn.style.right = '-150px';
            }
        }
    }

    function updateHistoryPanel() {
        const content = document.getElementById('history-content');
        content.innerHTML = '';
        
        let hasRecord = false;
        
        ['전기기능사', '전자기능사', '승강기기능사'].forEach(examId => {
            let record = userDb[currentUser][examId];
            if (record && record.history && record.history.length > 0) {
                hasRecord = true;
                let html = `<div class="history-item">
                                <div class="history-item-title">📋 ${examId}</div>`;
                
                let recentHistory = [...record.history].reverse().slice(0, 5);
                recentHistory.forEach(h => {
                    let isPass = h.score >= 60;
                    let passClass = isPass ? 'pass' : 'fail';
                    let passText = isPass ? '<span class="pass-text">합격</span>' : '<span class="fail-text">탈락</span>';
                    html += `<div class="history-record ${passClass}">
                                [${h.date}] <strong>${h.score}점</strong> - ${passText}
                             </div>`;
                });
                html += `</div>`;
                content.innerHTML += html;
            }
        });

        if (!hasRecord) {
            content.innerHTML = '<div style="color: var(--muted-color); font-size: 14px; text-align: center; margin-top: 30px;">아직 응시 기록이 없어요.<br>지금 바로 모의고사에 도전해보세요!</div>';
        }
    }

    function login() {
        const inputId = document.getElementById('userid').value.trim().toLowerCase();
        if (usersInfo[inputId]) {
            currentUser = inputId;
            if(!userDb[currentUser]) userDb[currentUser] = {};
            
            document.getElementById('user-greeting').innerText = `${usersInfo[currentUser]} 조원 접속됨`;
            document.getElementById('user-greeting').style.display = 'inline-block';
            document.getElementById('logout-btn').style.display = 'inline-block';
            document.getElementById('header-status').style.display = 'inline-block';
            
            initApp();
            showScreen('exam-select-screen');

            document.getElementById('history-toggle-btn').style.display = 'block';
            updateHistoryPanel();
            setTimeout(() => { toggleHistoryPanel('show'); }, 300); 
            
        } else {
            alert('등록되지 않은 아이디야! (soonjae, wonjae, seongyun, eunseong 중 하나를 입력해)');
        }
    }

        document.getElementById('quiz-footer').style.display = 'none';
        document.getElementById('home-btn').style.display = 'none';
        document.getElementById('header-status').innerText = '대기 중';
        document.getElementById('main-container').classList.remove('danger-mode');
        
        initApp(); 
        showScreen('exam-select-screen');

        updateHistoryPanel();
        document.getElementById('history-toggle-btn').style.display = 'block';
        setTimeout(() => { toggleHistoryPanel('show'); }, 300);
    }

    function initApp() {
        const exams = [
            { id: "전기기능사", class: "elec", icon: "⚡" },
            { id: "전자기능사", class: "electro", icon: "💻" },
            { id: "승강기기능사", class: "elev", icon: "🏢" }
        ];
        
        const container = document.getElementById('exam-btn-container');
        container.innerHTML = '';
        
        exams.forEach((exam) => {
            const btn = document.createElement('button');
            btn.className = `exam-btn ${exam.class}`;
            
            let statusBadge = "";
            let record = userDb[currentUser][exam.id];
            
            if (record && record.completed) {
                let displayScore = record.bestScore;
                if (displayScore <= 20) { displayScore *= 5; } 

                let passFailStr = displayScore >= 60 ? "<span style='color:#2ecc71;'>(합격)</span>" : "<span style='color:#e74c3c;'>(불합격)</span>";
                statusBadge = `<br><span class='status-text'>[내 최고 점수: ${displayScore}점 ${passFailStr}]</span>`;
            }

            btn.innerHTML = `${exam.icon} ${exam.id} CBT 모의고사 ${statusBadge}`;
            btn.onclick = () => startAdaptiveTest(exam.id);
            container.appendChild(btn);
        });
    }

    function startAdaptiveTest(examId) {
        toggleHistoryPanel('hide');
        document.getElementById('history-toggle-btn').style.display = 'none';

        currentExamId = examId;
        currentSubjectPool = [...db[examId]];
        askedQuestions = [];
        userAnswers = [];
        currentIdx = 0;
        currentLvl = 1; 

        document.getElementById('header-status').innerText = `${examId}`;
        document.getElementById('home-btn').style.display = 'block'; 
        document.getElementById('quiz-footer').style.display = 'flex';
        
        showScreen('quiz-screen');
        pickNextQuestion(undefined); 
        renderQuestion();
    }

    function pickNextQuestion(isLastCorrect) {
        let targetLvl = 1;
        if (isLastCorrect === undefined) targetLvl = 1; 
        else if (isLastCorrect === true) targetLvl = 3; 
        else {
            if (currentLvl === 3) targetLvl = 2; 
            else targetLvl = 1; 
        }

        let candidates = currentSubjectPool.filter(q => q.lvl === targetLvl);

        if (candidates.length === 0 && currentSubjectPool.length > 0) {
            let sorted = [...currentSubjectPool].sort((a, b) => Math.abs(a.lvl - targetLvl) - Math.abs(b.lvl - targetLvl));
            let bestDiff = Math.abs(sorted[0].lvl - targetLvl);
            candidates = sorted.filter(q => Math.abs(q.lvl - targetLvl) === bestDiff);
        }

        if (candidates.length > 0) {
            const randIdx = Math.floor(Math.random() * candidates.length);
            const selectedQ = candidates[randIdx];
            currentSubjectPool = currentSubjectPool.filter(q => q !== selectedQ);
            askedQuestions.push(selectedQ);
            currentLvl = selectedQ.lvl;
        }
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = MAX_TIME;
        
        const timerContainer = document.getElementById('timer-container');
        const timerBar = document.getElementById('timer-bar');
        const timerText = document.getElementById('timer-text');
        const mainContainer = document.getElementById('main-container');

        timerContainer.style.display = 'block';
        mainContainer.classList.remove('danger-mode');
        
        timerBar.style.width = '0%';
        timerBar.style.backgroundColor = '#2ecc71'; 
        timerText.style.color = ""; 

        timerInterval = setInterval(() => {
            timeLeft--;
            
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timerText.innerText = `0${m}:${s < 10 ? '0' + s : s}`;

            let percentFilled = ((MAX_TIME - timeLeft) / MAX_TIME) * 100;
            timerBar.style.width = `${percentFilled}%`;

            if (timeLeft <= 30 && timeLeft > 10) {
                timerBar.style.backgroundColor = '#f39c12'; 
            } else if (timeLeft <= 10) {
                timerBar.style.backgroundColor = '#e74c3c'; 
                timerText.style.color = "#fff"; 
                mainContainer.classList.add('danger-mode'); 
            }

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                triggerExplosion(); 
            }
        }, 1000);
    }

    function triggerExplosion() {
        const mainContainer = document.getElementById('main-container');
        const explosionScreen = document.getElementById('explosion-screen');

        mainContainer.classList.add('shake-effect');
        explosionScreen.style.display = 'flex'; 

        setTimeout(() => {
            mainContainer.classList.remove('shake-effect');
            mainContainer.classList.remove('danger-mode');
            explosionScreen.style.display = 'none';
            timeOutHandler(); 
        }, 1500);
    }

    function timeOutHandler() {
        userAnswers[currentIdx] = -1; 
        
        const correctIndex = askedQuestions[currentIdx].a;
        const radios = document.getElementsByName('q-option');
        radios.forEach(r => {
            r.disabled = true;
            r.parentElement.classList.add('disabled');
        });

        const correctLabel = document.getElementById(`opt-label-${correctIndex}`);
        if(correctLabel) correctLabel.classList.add('correct');

        document.getElementById('exp-text').innerHTML = askedQuestions[currentIdx].e;
        document.getElementById('explanation').style.display = 'block';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        if (currentIdx === 19) {
            nextBtn.innerText = "제출 및 채점";
            nextBtn.style.backgroundColor = "#2ecc71"; 
        } else {
            nextBtn.innerText = "다음 문제 ▶";
            nextBtn.style.backgroundColor = "#3498db"; 
        }
    }

    function renderQuestion() {
        const qData = askedQuestions[currentIdx];
        
        const diffBadge = document.getElementById('q-difficulty');
        diffBadge.className = 'difficulty-badge';
        if (qData.lvl === 1) { diffBadge.innerText = '★☆☆ 기초'; diffBadge.classList.add('diff-easy'); }
        else if (qData.lvl === 2) { diffBadge.innerText = '★★☆ 응용'; diffBadge.classList.add('diff-medium'); }
        else { diffBadge.innerText = '★★★ 킬러'; diffBadge.classList.add('diff-hard'); }

        document.getElementById('q-text').innerHTML = `${currentIdx + 1}. ${qData.q}`;
        document.getElementById('progress-text').innerText = `${currentIdx + 1} / 20`;
        
        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = true;
        nextBtn.innerText = "정답을 선택하세요";
        nextBtn.style.backgroundColor = "#95a5a6"; 

        const optionsList = document.getElementById('options-list');
        optionsList.innerHTML = '';

        const numSymbols = ['①', '②', '③', '④'];
        qData.o.forEach((optText, i) => {
            const li = document.createElement('li');
            const label = document.createElement('label');
            label.className = 'option-label';
            label.id = `opt-label-${i}`;
            
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q-option';
            radio.value = i;
            radio.onchange = () => selectOption(i);

            label.appendChild(radio);
            label.appendChild(document.createTextNode(` ${numSymbols[i]} ${optText}`));
            li.appendChild(label);
            optionsList.appendChild(li);
        });

        document.getElementById('explanation').style.display = 'none';
        
        startTimer();
    }

    function selectOption(selectedIndex) {
        clearInterval(timerInterval);
        document.getElementById('main-container').classList.remove('danger-mode');

        userAnswers[currentIdx] = selectedIndex;

        const correctIndex = askedQuestions[currentIdx].a;
        const radios = document.getElementsByName('q-option');
        radios.forEach(r => {
            r.disabled = true;
            r.parentElement.classList.add('disabled');
        });

        const selectedLabel = document.getElementById(`opt-label-${selectedIndex}`);
        const correctLabel = document.getElementById(`opt-label-${correctIndex}`);

        if (selectedIndex === correctIndex) {
            selectedLabel.classList.add('correct');
        } else {
            selectedLabel.classList.add('incorrect');
            correctLabel.classList.add('correct');
        }

        document.getElementById('exp-text').innerHTML = askedQuestions[currentIdx].e;
        document.getElementById('explanation').style.display = 'block';

        const nextBtn = document.getElementById('next-btn');
        nextBtn.disabled = false;
        if (currentIdx === 19) {
            nextBtn.innerText = "제출 및 채점";
            nextBtn.style.backgroundColor = "#2ecc71"; 
        } else {
            nextBtn.innerText = "다음 문제 ▶";
            nextBtn.style.backgroundColor = "#3498db"; 
        }
    }

    function goNext() {
        const isCorrect = (userAnswers[currentIdx] === askedQuestions[currentIdx].a);

        if (currentIdx < 19) { 
            pickNextQuestion(isCorrect); 
            currentIdx++; 
            renderQuestion(); 
        } else { 
            showResult(); 
        }
    }

    function showResult() {
        clearInterval(timerInterval);
        document.getElementById('timer-container').style.display = 'none';
        document.getElementById('main-container').classList.remove('danger-mode');

        let correctCount = 0;
        for (let i = 0; i < askedQuestions.length; i++) {
            if (userAnswers[i] === askedQuestions[i].a) correctCount++;
        }

        let totalPoints = correctCount * 5;

        let now = new Date();
        let mStr = now.getMinutes() < 10 ? '0' + now.getMinutes() : now.getMinutes();
        let timeStr = `${now.getMonth() + 1}월 ${now.getDate()}일 ${now.getHours()}시 ${mStr}분`;

        if(!userDb[currentUser][currentExamId]) {
            userDb[currentUser][currentExamId] = { completed: true, bestScore: totalPoints, history: [] };
        }
        
        if(!userDb[currentUser][currentExamId].history) {
            userDb[currentUser][currentExamId].history = [];
        }

        userDb[currentUser][currentExamId].history.push({ score: totalPoints, date: timeStr });

        let prevBest = userDb[currentUser][currentExamId].bestScore;
        if (prevBest <= 20) prevBest *= 5;
        
        if(totalPoints > prevBest) {
            userDb[currentUser][currentExamId].bestScore = totalPoints;
        } else {
            userDb[currentUser][currentExamId].bestScore = prevBest; 
        }
        
        localStorage.setItem('cbtUserDb', JSON.stringify(userDb));

        document.getElementById('quiz-footer').style.display = 'none';
        document.getElementById('header-status').innerText = "시험 종료";
        document.getElementById('final-score').innerText = `${totalPoints} 점`;
        
        const msg = document.getElementById('result-msg');
        
        if (totalPoints >= 60) {
            if (totalPoints >= 90) {
                msg.innerHTML = "🎉 <strong>[합격]</strong> 완벽해! 압도적인 점수로 합격이야!";
                msg.style.color = "#2ecc71";
            } else {
                msg.innerHTML = "🎉 <strong>[합격]</strong> 합격선 통과! 이 기세로 실전도 부숴보자!";
                msg.style.color = "#3498db";
            }
        } else {
            msg.innerHTML = "💀 <strong>[불합격 / 탈락]</strong><br>60점(12문제) 이상 맞혀야 합격인데... 탈락이야!<br>이대로면 실제 시험에서도 위험해. 꼼꼼히 다시 공부하자!";
            msg.style.color = "#e74c3c";
        }

        showScreen('result-screen');
    }

    function resetAndRetake() {
        startAdaptiveTest(currentExamId);
    }
</script>
